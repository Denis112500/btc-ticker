<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BTC/USD-LIVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #05070a;
    --bg-panel: #0a0f14;
    --green: #00ff9d;
    --red: #ff3b5c;
    --dim: #4a5560;
    --line: #12181f;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
    position: relative;
  }

  .scanlines {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,157,0.025) 0px,
      rgba(0,255,157,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 5;
  }

  .vignette {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    z-index: 4;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--dim);
    padding-top: 8px;
  }

  header .tag { display: flex; align-items: center; gap: 8px; }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }

  .dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
  }

  .label {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.3em;
    margin-bottom: 14px;
  }

  .price {
    font-size: 15vw;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
    text-shadow: 0 0 18px rgba(0,255,157,0.45);
    transition: color 0.3s ease;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .price.down { color: var(--red); text-shadow: 0 0 18px rgba(255,59,92,0.45); }

  .price.flash { animation: flash 0.4s ease; }
  @keyframes flash { 0% { opacity: 0.3; } 100% { opacity: 1; } }

  .change {
    margin-top: 18px;
    font-size: 18px;
    color: var(--dim);
  }

  .change .val.up { color: var(--green); }
  .change .val.down { color: var(--red); }

  footer {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    display: flex;
    justify-content: space-between;
    padding-bottom: 8px;
  }

  .wake-status {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--dim);
    font-size: 12px;
    padding: 10px 16px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 10;
    letter-spacing: 0.05em;
    max-width: 85vw;
    text-align: center;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body id="app">
<div class="scanlines"></div>
<div class="vignette"></div>

<header>
  <div class="tag"><span class="dot" id="statusDot"></span><span id="statusText">LIVE</span><span style="opacity:0.5">· KRAKEN</span></div>
  <div id="clock">--:--:--</div>
</header>

<main>
  <div class="label">BTC / USD</div>
  <div class="price" id="price">------</div>
  <div class="change">
    24h <span class="val" id="change">--</span>
  </div>
</main>

<footer>
  <div>ultima actualizare: <span id="lastUpdate">--</span></div>
</footer>

<div class="toast" id="toast"></div>

<script>
  const priceEl = document.getElementById('price');
  const changeEl = document.getElementById('change');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const lastUpdateEl = document.getElementById('lastUpdate');
  const wakeText = document.getElementById('wakeText');
  const wakeIcon = document.getElementById('wakeIcon');
  const clockEl = document.getElementById('clock');
  const toastEl = document.getElementById('toast');

  let lastPrice = null;
  let wakeLock = null;

  function showToast(msg, ms = 3500) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), ms);
  }

  function formatPrice(p) {
    return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function updateClock() {
    clockEl.textContent = new Date().toLocaleTimeString('ro-RO', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  async function fetchPrice() {
    try {
      const res = await fetch('https://api.kraken.com/0/public/Ticker?pair=XBTUSD');
      if (!res.ok) throw new Error('bad response');
      const data = await res.json();
      if (data.error && data.error.length) throw new Error('kraken error');
      const ticker = data.result[Object.keys(data.result)[0]];
      const price = parseFloat(ticker.c[0]);
      const openPrice = parseFloat(ticker.o);
      const changePct = ((price - openPrice) / openPrice) * 100;

      const isDown = lastPrice !== null && price < lastPrice;
      const isUp = lastPrice !== null && price > lastPrice;

      priceEl.textContent = formatPrice(price);
      priceEl.classList.remove('down', 'flash');
      void priceEl.offsetWidth;
      if (isDown) priceEl.classList.add('down');
      priceEl.classList.add('flash');

      changeEl.innerHTML = '<span class="val ' + (changePct >= 0 ? 'up' : 'down') + '">'
        + (changePct >= 0 ? '▲ +' : '▼ ') + changePct.toFixed(2) + '%</span>';

      lastPrice = price;
      lastUpdateEl.textContent = new Date().toLocaleTimeString('ro-RO', { hour12: false });
      statusDot.classList.remove('off');
      statusText.textContent = 'LIVE';
    } catch (e) {
      statusDot.classList.add('off');
      statusText.textContent = 'OFFLINE';
    }
  }

  fetchPrice();
  setInterval(fetchPrice, 5000);

  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => {
          wakeText.textContent = 'ecran: eliberat';
          wakeIcon.textContent = '○';
        });
      } else {
        wakeText.textContent = 'ecran: nesuportat, atinge ecranul';
        showToast('Foloseste Chrome.', 5000);
      }
    } catch (err) {
      wakeText.textContent = 'ecran: atinge pentru a activa';
      wakeIcon.textContent = '○';
    }
  }

  document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
      requestWakeLock();
    }
  });

  document.getElementById('app').addEventListener('click', () => {
    requestWakeLock();
  });

  requestWakeLock();
</script>
</body>
</html>
